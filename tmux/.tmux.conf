set -g mouse on
set-option -s set-clipboard on

# ESC遅延解消
set -s escape-time 0

# vimと同じで"prefix + :"でコマンドプロンプト出る
bind : command-prompt

# そのあと、:vsとか:spで画面分割できる
set -s command-alias[100] "vs=split-window -h"
set -s command-alias[101] "sp=split-window -v"

# んでペインの移動はhjklや
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R




# detachを:qでやったらおもろいかも
set -s command-alias[102] "q=detach-client"
# おまけでprefix+qだけでもdetachできるようにしてみる
bind q detach-client


### コピーモードの巻き

# vimライクベースにする
setw -g mode-keys vi
# OS側クリップボードにも貼る
bind-key -T copy-mode-vi y send-keys -X copy-pipe-and-cancel "xclip -selection clipboard"

# コピーモード入るときは
# prefix + [

# 範囲選択開始
bind-key -T copy-mode-vi v send-keys -X begin-selection
# やんく
bind-key -T copy-mode-vi y send-keys -X copy-selection-and-cancel

# 貼るときは
# prefix + ]



